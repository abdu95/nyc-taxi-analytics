version: 2

models:
  - name: fct_trips
    description: "Grain: one row per valid completed trip. Incremental model — merges new monthly data. Deduplicated via ROW_NUMBER() to handle known VeriFone duplicate submissions. Only credit card and cash trips included (payment_type IN (1,2)). Raw zone IDs joined to borough/zone names — mart layer intentionally exposes borough level only for privacy."
    columns:
      - name: trip_id
        tests:
          - not_null
          - unique        # surrogate key must be unique
      - name: pickup_datetime
        tests: [not_null]
      - name: total_amount
        tests: [not_null]
      - name: revenue_per_mile
        tests: [not_null]
      - name: pu_borough
        tests: [not_null]
      - name: taxi_type
        tests:
          - accepted_values:
              values: ['yellow', 'green']
      - name: payment_type
        tests:
          - accepted_values:
              values: [1, 2]  # fct_trips only has valid payment types
              quote: false # generate the values without quotes